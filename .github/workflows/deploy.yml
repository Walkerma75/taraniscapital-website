name: Deploy to S3 & Invalidate CloudFront

on:
  push:
    branches:
      - main
  # Manual trigger: re-tags every object's metadata and (because the dispatch
  # event carries no "before" SHA) flushes the whole CDN — see the invalidation
  # step. Use this to recover from a bad cache/content-type state at the edge.
  workflow_dispatch:

env:
  CACHE_LONG: "public, max-age=31536000, immutable"
  CACHE_HTML: "public, max-age=300, must-revalidate"
  CACHE_META: "public, max-age=3600"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (full history for diff)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Block a team or board page shipping with a missing share card or a
      # logo-only og:image (transparent PNG => blank LinkedIn/WhatsApp unfurl).
      # --check scans both team/ and board/ and renders nothing, so it needs
      # only Pillow, no system fonts. Runs before any S3 mutation so a failure
      # stops the deploy early.
      - name: Set up Python (share-card check)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify team & board share cards (block logo-only link previews)
        run: |
          python -m pip install --quiet pillow
          python tools/generate-share-cards.py --check

      # Block a deploy when a data-driven card JSON was edited but the HTML was
      # not regenerated. Both generators expose --check: they re-render in
      # memory and exit non-zero if any page would change, writing nothing.
      # Runs before any S3 mutation so drift stops the deploy early.
      - name: Verify data-driven cards in sync (strategic partners + fund teams)
        run: |
          python tools/build-partners.py --check
          python tools/build-people.py --check

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Purge internal file types from main bucket (defence-in-depth against internal-doc exposure)
        run: |
          aws s3 rm s3://${{ secrets.S3_BUCKET }}/ \
            --recursive \
            --exclude "*" \
            --include "*.md" \
            --include "*.xlsx" \
            --include "*.xls" \
            --include "*.bak" \
            --include "*.py"

      # The prefixes below are .gitignore'd and excluded from the sync, but
      # `aws s3 sync --delete` never removes excluded prefixes — so objects
      # uploaded before those exclusions existed persist publicly. None are
      # referenced by the site. Purge them explicitly every deploy. "Documents"
      # is currently empty in the bucket but is the most sensitive prefix
      # (PPMs, legal docs), so it is purged defensively.
      - name: Purge stale internal-asset prefixes from main bucket
        run: |
          for prefix in "Board of Advisors" "TC Logos" "Team Images" "Documents"; do
            echo "Purging s3://${{ secrets.S3_BUCKET }}/$prefix/ ..."
            aws s3 rm "s3://${{ secrets.S3_BUCKET }}/$prefix/" --recursive
          done

      - name: Sync main site to S3
        run: |
          # ALLOWLIST sync: publish ONLY known web-asset file types, so a stray
          # internal file at the repo root (.xlsx/.csv/.zip/.docx/.py/.bak/...)
          # can never be served. S3 CLI filters apply in order, LAST match wins:
          #   1. --exclude "*"             nothing is published by default
          #   2. --include "*.<webtype>"  re-include web-asset types
          #   3. --exclude "<dir>/*"      re-exclude internal dirs whose files DO
          #      match a web type (subdomains/ go to their own buckets; the rest
          #      are internal) — listed LAST so they override the type includes.
          # .pdf is intentionally NOT allowlisted: the only PDFs live in the
          # excluded Documents/ folder. Add --include "*.pdf" if a public PDF is
          # ever needed. The per-type/prefix purge steps above remain the second
          # layer that removes anything already in the bucket.
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --include "*.css" \
            --include "*.js" \
            --include "*.json" \
            --include "*.xml" \
            --include "*.txt" \
            --include "*.jpg" \
            --include "*.jpeg" \
            --include "*.png" \
            --include "*.gif" \
            --include "*.svg" \
            --include "*.webp" \
            --include "*.avif" \
            --include "*.ico" \
            --include "*.woff" \
            --include "*.woff2" \
            --include "*.ttf" \
            --include "*.otf" \
            --include "*.eot" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "docs/*" \
            --exclude "infra/*" \
            --exclude "secrets/*" \
            --exclude "Wp-content/*" \
            --exclude "Board of Advisors/*" \
            --exclude "Documents/*" \
            --exclude "TC Logos/*" \
            --exclude "Team Images/*" \
            --exclude "subdomains/*"

      # ---- Cache-Control tiering -----------------------------------------
      # The sync above does not set Cache-Control, so CloudFront falls back
      # to its default minimum TTL. Re-tag objects with explicit headers
      # so static assets stay at the edge for a year and HTML for 5 min.
      # Server-side copy — no upload bandwidth.
      #
      # IMPORTANT: --metadata-directive REPLACE wipes ALL metadata, including
      # Content-Type. With --recursive the CLI cannot re-guess per-file MIME
      # types, so omitting --content-type defaults every object to
      # binary/octet-stream — and standards-mode browsers refuse to apply a
      # stylesheet that isn't served as text/css (the page renders unstyled).
      # We therefore set --content-type explicitly, one MIME type per pass.

      - name: Apply long Cache-Control + Content-Type to static assets
        run: |
          set -e
          # include-glob : content-type  (server-side re-tag, one MIME per pass)
          declare -A ASSET_TYPES=(
            ["*.css"]="text/css; charset=utf-8"
            ["*.js"]="application/javascript; charset=utf-8"
            ["*.jpg"]="image/jpeg"
            ["*.png"]="image/png"
          )
          for glob in "${!ASSET_TYPES[@]}"; do
            aws s3 cp \
              "s3://${{ secrets.S3_BUCKET }}/" \
              "s3://${{ secrets.S3_BUCKET }}/" \
              --recursive \
              --exclude "*" --include "$glob" \
              --metadata-directive REPLACE \
              --content-type "${ASSET_TYPES[$glob]}" \
              --cache-control "$CACHE_LONG"
          done

      - name: Apply short Cache-Control to HTML
        run: |
          aws s3 cp \
            "s3://${{ secrets.S3_BUCKET }}/" \
            "s3://${{ secrets.S3_BUCKET }}/" \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --metadata-directive REPLACE \
            --content-type "text/html; charset=utf-8" \
            --cache-control "$CACHE_HTML"

      - name: Apply medium Cache-Control + Content-Type to metadata files
        run: |
          set -e
          # filename : content-type  (REPLACE wipes Content-Type — set it back)
          declare -A META_TYPES=(
            ["robots.txt"]="text/plain; charset=utf-8"
            ["sitemap.xml"]="application/xml"
            ["llms.txt"]="text/plain; charset=utf-8"
            ["humans.txt"]="text/plain; charset=utf-8"
            ["security.txt"]="text/plain; charset=utf-8"
            ["taranis-people-data.json"]="application/json"
            ["taranis-partners-data.json"]="application/json"
          )
          for f in "${!META_TYPES[@]}"; do
            if aws s3 ls "s3://${{ secrets.S3_BUCKET }}/$f" >/dev/null 2>&1; then
              aws s3 cp \
                "s3://${{ secrets.S3_BUCKET }}/$f" \
                "s3://${{ secrets.S3_BUCKET }}/$f" \
                --metadata-directive REPLACE \
                --content-type "${META_TYPES[$f]}" \
                --cache-control "$CACHE_META"
            fi
          done

      # ---- Subdomain syncs (each their own bucket + distribution) --------

      - name: Sync fintech subdomain to S3
        run: aws s3 sync subdomains/fintech/ s3://fintech.taraniscapital.com/ --delete

      - name: Sync datacentre subdomain to S3
        run: aws s3 sync subdomains/datacentre/ s3://datacentre.taraniscapital.com/ --delete

      - name: Sync property subdomain to S3
        run: aws s3 sync subdomains/property/ s3://property.taraniscapital.com/ --delete

      - name: Sync disruptive-tech subdomain to S3
        run: aws s3 sync subdomains/disruptive-tech/ s3://disruptive-tech.taraniscapital.com/ --delete

      - name: Sync biotech subdomain to S3
        run: aws s3 sync subdomains/biotech/ s3://biotech.taraniscapital.com/ --delete

      # ---- Targeted CloudFront invalidation -------------------------------
      # Replace the previous blanket "/*" invalidation across all six
      # distributions with a per-file plan derived from the actual diff.
      # This is the single biggest lever for CloudFront request volume:
      # blanket "/*" forces every subsequent crawler/visitor request to
      # miss the edge cache and re-hit S3.

      - name: Compute invalidation plan
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          # Manual workflow_dispatch runs carry no "before" SHA. Default it to
          # the zero SHA so compute-invalidations.sh emits "/*" for every
          # distribution — a deliberate full CDN flush for recovery runs.
          : "${BEFORE:=0000000000000000000000000000000000000000}"
          bash infra/compute-invalidations.sh "$BEFORE" "$AFTER" \
            | tee /tmp/invals.txt
          echo "Plan summary:"
          cut -d: -f1 /tmp/invals.txt | sort | uniq -c

      - name: Invalidate CloudFront caches (per-distribution, per-file)
        run: |
          set -e
          # Paths are passed UNQUOTED below (SC2086) so a multi-path string
          # word-splits into separate --paths args. Disable globbing so a
          # literal "/*" stays "/*" instead of pathname-expanding against the
          # runner's filesystem — without this, a full-flush invalidation
          # silently submitted /bin /etc /usr ... instead of /*, so the edge
          # cache was never cleared.
          set -f
          declare -A DIST_IDS=(
            [APEX]="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
            [FINTECH]="E260FGTXCVORQ6"
            [DATACENTRE]="E3EJUFMMNZLO3V"
            [PROPERTY]="E2H8IQKJ8LPQ01"
            [DISRUPTIVE_TECH]="E98QNGA1O9AI0"
            [BIOTECH]="ESMIKURPBA41W"
          )
          for dist in "${!DIST_IDS[@]}"; do
            paths=$(grep "^${dist}:" /tmp/invals.txt | cut -d: -f2- || true)
            if [ -z "$paths" ]; then
              echo "[$dist] no changes — skipping invalidation"
              continue
            fi
            echo "[$dist] invalidating $(echo "$paths" | wc -l) path(s):"
            echo "$paths" | sed 's/^/  /'
            # shellcheck disable=SC2086
            aws cloudfront create-invalidation \
              --distribution-id "${DIST_IDS[$dist]}" \
              --paths $paths
          done

      # The diff-based plan above only covers paths that changed in this push.
      # The internal files purged earlier may still be cached at the edge (the
      # xlsx was served with X-Cache: Hit), so invalidate them explicitly on the
      # apex distribution. Spaces are %20-encoded to match the cached request URI.
      - name: Invalidate purged internal paths on apex distribution
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths \
              "/Taranis-People-Data-Collection.xlsx" \
              "/Board%20of%20Advisors/*" \
              "/TC%20Logos/*" \
              "/Team%20Images/*" \
              "/tools/add-press-release.py" \
              "/tools/xlsx-sync-guard.py"
