name: Deploy to S3 & Invalidate CloudFront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync main site to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude "*.md" \
            --exclude "docs/*" \
            --exclude "Wp-content/*" \
            --exclude "Board of Advisors/*" \
            --exclude "Documents/*" \
            --exclude "TC Logos/*" \
            --exclude "Team Images/*" \
            --exclude "subdomains/*"

      - name: Sync fintech subdomain to S3
        run: aws s3 sync subdomains/fintech/ s3://fintech.taraniscapital.com/ --delete

      - name: Sync datacentre subdomain to S3
        run: aws s3 sync subdomains/datacentre/ s3://datacentre.taraniscapital.com/ --delete

      - name: Sync property subdomain to S3
        run: aws s3 sync subdomains/property/ s3://property.taraniscapital.com/ --delete

      - name: Sync disruptive-tech subdomain to S3
        run: aws s3 sync subdomains/disruptive-tech/ s3://disruptive-tech.taraniscapital.com/ --delete

      - name: Sync biotech subdomain to S3
        run: aws s3 sync subdomains/biotech/ s3://biotech.taraniscapital.com/ --delete

      - name: Invalidate CloudFront caches
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          aws cloudfront create-invalidation \
            --distribution-id E260FGTXCVORQ6 \
            --paths "/*"
          aws cloudfront create-invalidation \
            --distribution-id E3EJUFMMNZLO3V \
            --paths "/*"
          aws cloudfront create-invalidation \
            --distribution-id E2H8IQKJ8LPQ01 \
            --paths "/*"
          aws cloudfront create-invalidation \
            --distribution-id E98QNGA1O9AI0 \
            --paths "/*"
          aws cloudfront create-invalidation \
            --distribution-id ESMIKURPBA41W \
            --paths "/*"
