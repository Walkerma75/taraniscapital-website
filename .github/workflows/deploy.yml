name: Deploy to S3 & Invalidate CloudFront

on:
  push:
    branches:
      - main

env:
  CACHE_LONG: "public, max-age=31536000, immutable"
  CACHE_HTML: "public, max-age=300, must-revalidate"
  CACHE_META: "public, max-age=3600"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Purge internal file types from main bucket (defence-in-depth against internal-doc exposure)
        run: |
          aws s3 rm s3://${{ secrets.S3_BUCKET }}/ \
            --recursive \
            --exclude "*" \
            --include "*.md" \
            --include "*.xlsx" \
            --include "*.xls" \
            --include "*.bak"

      # The prefixes below are .gitignore'd and excluded from the sync, but
      # `aws s3 sync --delete` never removes excluded prefixes — so objects
      # uploaded before those exclusions existed persist publicly. None are
      # referenced by the site. Purge them explicitly every deploy. "Documents"
      # is currently empty in the bucket but is the most sensitive prefix
      # (PPMs, legal docs), so it is purged defensively.
      - name: Purge stale internal-asset prefixes from main bucket
        run: |
          for prefix in "Board of Advisors" "TC Logos" "Team Images" "Documents"; do
            echo "Purging s3://${{ secrets.S3_BUCKET }}/$prefix/ ..."
            aws s3 rm "s3://${{ secrets.S3_BUCKET }}/$prefix/" --recursive
          done

      - name: Sync main site to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude "*.md" \
            --exclude "*.xlsx" \
            --exclude "*.xls" \
            --exclude "*.bak" \
            --exclude "docs/*" \
            --exclude "infra/*" \
            --exclude "Wp-content/*" \
            --exclude "Board of Advisors/*" \
            --exclude "Documents/*" \
            --exclude "TC Logos/*" \
            --exclude "Team Images/*" \
            --exclude "subdomains/*"

      # ---- Cache-Control tiering -----------------------------------------
      # The sync above does not set Cache-Control, so CloudFront falls back
      # to its default minimum TTL. Re-tag objects with explicit headers
      # so static assets stay at the edge for a year and HTML for 5 min.
      # Server-side copy — no upload bandwidth.

      - name: Apply long Cache-Control to static assets (css/js/images/fonts)
        run: |
          for d in css js images fonts; do
            if aws s3 ls "s3://${{ secrets.S3_BUCKET }}/$d/" >/dev/null 2>&1; then
              aws s3 cp \
                "s3://${{ secrets.S3_BUCKET }}/$d/" \
                "s3://${{ secrets.S3_BUCKET }}/$d/" \
                --recursive \
                --metadata-directive REPLACE \
                --cache-control "$CACHE_LONG"
            fi
          done

      - name: Apply short Cache-Control to HTML
        run: |
          aws s3 cp \
            "s3://${{ secrets.S3_BUCKET }}/" \
            "s3://${{ secrets.S3_BUCKET }}/" \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --metadata-directive REPLACE \
            --content-type "text/html; charset=utf-8" \
            --cache-control "$CACHE_HTML"

      - name: Apply medium Cache-Control to metadata files
        run: |
          for f in robots.txt sitemap.xml llms.txt humans.txt security.txt taranis-people-data.json; do
            if aws s3 ls "s3://${{ secrets.S3_BUCKET }}/$f" >/dev/null 2>&1; then
              aws s3 cp \
                "s3://${{ secrets.S3_BUCKET }}/$f" \
                "s3://${{ secrets.S3_BUCKET }}/$f" \
                --metadata-directive REPLACE \
                --cache-control "$CACHE_META"
            fi
          done

      # ---- Subdomain syncs (each their own bucket + distribution) --------

      - name: Sync fintech subdomain to S3
        run: aws s3 sync subdomains/fintech/ s3://fintech.taraniscapital.com/ --delete

      - name: Sync datacentre subdomain to S3
        run: aws s3 sync subdomains/datacentre/ s3://datacentre.taraniscapital.com/ --delete

      - name: Sync property subdomain to S3
        run: aws s3 sync subdomains/property/ s3://property.taraniscapital.com/ --delete

      - name: Sync disruptive-tech subdomain to S3
        run: aws s3 sync subdomains/disruptive-tech/ s3://disruptive-tech.taraniscapital.com/ --delete

      - name: Sync biotech subdomain to S3
        run: aws s3 sync subdomains/biotech/ s3://biotech.taraniscapital.com/ --delete

      # ---- Targeted CloudFront invalidation -------------------------------
      # Replace the previous blanket "/*" invalidation across all six
      # distributions with a per-file plan derived from the actual diff.
      # This is the single biggest lever for CloudFront request volume:
      # blanket "/*" forces every subsequent crawler/visitor request to
      # miss the edge cache and re-hit S3.

      - name: Compute invalidation plan
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          bash infra/compute-invalidations.sh "$BEFORE" "$AFTER" \
            | tee /tmp/invals.txt
          echo "Plan summary:"
          cut -d: -f1 /tmp/invals.txt | sort | uniq -c

      - name: Invalidate CloudFront caches (per-distribution, per-file)
        run: |
          set -e
          declare -A DIST_IDS=(
            [APEX]="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
            [FINTECH]="E260FGTXCVORQ6"
            [DATACENTRE]="E3EJUFMMNZLO3V"
            [PROPERTY]="E2H8IQKJ8LPQ01"
            [DISRUPTIVE_TECH]="E98QNGA1O9AI0"
            [BIOTECH]="ESMIKURPBA41W"
          )
          for dist in "${!DIST_IDS[@]}"; do
            paths=$(grep "^${dist}:" /tmp/invals.txt | cut -d: -f2- || true)
            if [ -z "$paths" ]; then
              echo "[$dist] no changes — skipping invalidation"
              continue
            fi
            echo "[$dist] invalidating $(echo "$paths" | wc -l) path(s):"
            echo "$paths" | sed 's/^/  /'
            # shellcheck disable=SC2086
            aws cloudfront create-invalidation \
              --distribution-id "${DIST_IDS[$dist]}" \
              --paths $paths
          done

      # The diff-based plan above only covers paths that changed in this push.
      # The internal files purged earlier may still be cached at the edge (the
      # xlsx was served with X-Cache: Hit), so invalidate them explicitly on the
      # apex distribution. Spaces are %20-encoded to match the cached request URI.
      - name: Invalidate purged internal paths on apex distribution
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths \
              "/Taranis-People-Data-Collection.xlsx" \
              "/Board%20of%20Advisors/*" \
              "/TC%20Logos/*" \
              "/Team%20Images/*"
